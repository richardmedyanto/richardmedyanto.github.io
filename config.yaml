baseURL: https://richardmedyanto.github.io/
title: Richard Medyanto's Blog
theme: custom
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
pagination:
  pagerSize: 5

languages:
  en:
    languageName: English
    weight: 1
    title: Richard Medyanto's Blog
    params:
      description: "Hi, I'm Richard — engineer, builder, and chronic over-thinker. I write about my projects, technical deep-dives, and life experiences."
  zh-tw:
    languageName: 繁體中文
    weight: 2
    title: Richard Medyanto 的部落格
    params:
      description: "嗨，我是 Richard — 工程師、建造者，也是個停不下來的過度思考者。我在這裡記錄我的專案、技術深度探索，以及生活點滴。"
  zh-cn:
    languageName: 简体中文
    weight: 3
    title: Richard Medyanto 的博客
    params:
      description: "嗨，我是 Richard — 工程师、建造者，也是个停不下来的过度思考者。我在这里记录我的项目、技术深度探索，以及生活点滴。"

params:
  author: Richard Medyanto
  avatar: /img/avatar.jpg   # put your avatar at static/img/avatar.jpg
  favicon: /img/avatar.jpg
  socials:
    - name: LinkedIn
      url: https://linkedin.com/in/richardmedyanto
      icon: brand-linkedin
    - name: GitHub
      url: https://github.com/richardmedyanto
      icon: brand-github
    - name: Email
      url: mailto:richard1medyanto@gmail.com
      icon: brand-email

menu:
  main:
    - identifier: nav_home
      name: Home
      url: /
      weight: 1
      pre: home
    - identifier: nav_cv
      name: Curriculum Vitae
      url: /curriculum-vitae/
      weight: 2
      pre: cv
    - identifier: nav_archives
      name: Archives
      url: /archives/
      weight: 3
      pre: archives
    - identifier: nav_search
      name: Search
      url: /search/
      weight: 4
      pre: search

taxonomies:
  category: categories
  tag: tags

minify:
  disableXML: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github
    lineNos: false
