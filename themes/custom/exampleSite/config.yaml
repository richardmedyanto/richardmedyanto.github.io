baseURL: https://richardmedyanto.github.io/
title: Richard Medyanto's Blog
theme: custom
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
paginate: 5

languages:
  en:
    languageName: English
    weight: 1
    title: Richard Medyanto's Blog
    params:
      description: "Hi, I'm Richard — an engineer driven by a deep passion for technology and innovation. This blog is where I share my latest projects, technical insights, and hands-on experiences!"
  zh-tw:
    languageName: 繁體中文
    weight: 2
    contentDir: content/zh-tw
    title: Richard Medyanto 的部落格
    params:
      description: "嗨，我是 Richard — 一位對科技與創新充滿熱情的工程師。"
  zh-cn:
    languageName: 简体中文
    weight: 3
    contentDir: content/zh-cn
    title: Richard Medyanto 的博客
    params:
      description: "嗨，我是 Richard — 一位对科技与创新充满热情的工程师。"

params:
  author: Richard Medyanto
  avatar: /img/avatar.jpg   # put your avatar at static/img/avatar.jpg
  favicon: /favicon.ico
  socials:
    - name: LinkedIn
      url: https://linkedin.com/in/yourhandle
      icon: brand-linkedin
    - name: WhatsApp
      url: https://wa.me/000000000
      icon: brand-whatsapp
    - name: Email
      url: mailto:you@example.com
      icon: brand-email

menu:
  main:
    - name: Home
      url: /
      weight: 1
      pre: home          # matches assets/icons/home.svg
    - name: Curriculum Vitae
      url: /curriculum-vitae/
      weight: 2
      pre: cv
    - name: Archives
      url: /archives/
      weight: 3
      pre: archives
    - name: Search
      url: /search/
      weight: 4
      pre: search

taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github
    lineNos: false
